repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: mkdocs-strict
        name: mkdocs build --strict
        entry: mkdocs build --strict --quiet
        language: system
        pass_filenames: false
        files: ^(docs/|mkdocs\.yml$)
